<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Application Declined — ElevateLife</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet" />
  <style>
    .decline-wrap { max-width: 720px; margin: 60px auto; padding: 0 24px; }
    .decline-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 32px; }
    .decline-card h1 { margin: 0 0 8px 0; font-size: 24px; }
    .decline-card .sub { color: #6b7280; margin-bottom: 24px; }
    .status { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
    .status.loading { background: #f3f4f6; color: #374151; }
    .status.error   { background: #fef2f2; color: #b91c1c; }
    .status.success { background: #f0fdf4; color: #166534; }
    form { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    form .full { grid-column: 1 / -1; }
    label { display: block; font-size: 12px; color: #6b7280; margin-bottom: 4px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font: inherit; }
    .raw { margin-top: 24px; }
    .raw summary { cursor: pointer; color: #6b7280; font-size: 13px; }
    pre { background: #0f172a; color: #e2e8f0; padding: 16px; border-radius: 8px; overflow-x: auto; font-size: 12px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container nav-content">
      <a href="/" class="logo">Elevate<span>Life</span></a>
    </div>
  </nav>

  <main class="decline-wrap">
    <div class="decline-card">
      <h1>We couldn't approve financing this time</h1>
      <p class="sub">No worries — you can finish your enrollment here and we'll work out payment another way.</p>

      <div id="status" class="status loading">Loading your details…</div>

      <form id="autofill" hidden>
        <div>
          <label for="first_name">First name</label>
          <input id="first_name" name="first_name" />
        </div>
        <div>
          <label for="last_name">Last name</label>
          <input id="last_name" name="last_name" />
        </div>
        <div class="full">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" />
        </div>
        <div>
          <label for="phone">Phone</label>
          <input id="phone" name="phone" />
        </div>
        <div>
          <label for="date_of_birth">Date of birth</label>
          <input id="date_of_birth" name="date_of_birth" />
        </div>
        <div class="full">
          <label for="street">Street address</label>
          <input id="street" name="street" />
        </div>
        <div>
          <label for="city">City</label>
          <input id="city" name="city" />
        </div>
        <div>
          <label for="state">State</label>
          <input id="state" name="state" />
        </div>
        <div>
          <label for="zip">ZIP</label>
          <input id="zip" name="zip" />
        </div>
        <div>
          <label for="employer">Employer</label>
          <input id="employer" name="employer" />
        </div>
      </form>

      <details class="raw" id="rawWrap" hidden>
        <summary>Raw decode response</summary>
        <pre id="raw"></pre>
      </details>
    </div>
  </main>

  <script>
    const DECODE_URL = 'http://localhost:8000/shifi-c/decline-token/decode';
    const statusEl = document.getElementById('status');
    const form = document.getElementById('autofill');
    const rawWrap = document.getElementById('rawWrap');
    const raw = document.getElementById('raw');

    function setStatus(kind, msg) {
      statusEl.className = 'status ' + kind;
      statusEl.textContent = msg;
    }

    async function run() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');

      if (!token) {
        setStatus('error', 'No token in URL — nothing to autofill.');
        return;
      }

      try {
        const res = await fetch(DECODE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({ token }),
        });

        if (!res.ok) {
          const body = await res.text();
          setStatus('error', `Decode failed (${res.status}). ${body}`);
          return;
        }

        const data = await res.json();
        const c = data.customer || {};
        const addr = c.address || {};
        const emp = c.employment || {};

        document.getElementById('first_name').value = c.first_name || '';
        document.getElementById('last_name').value = c.last_name || '';
        document.getElementById('email').value = c.email || '';
        document.getElementById('phone').value = c.phone || '';
        document.getElementById('date_of_birth').value = c.date_of_birth || '';
        document.getElementById('street').value = addr.street || '';
        document.getElementById('city').value = addr.city || '';
        document.getElementById('state').value = addr.state || '';
        document.getElementById('zip').value = addr.zip || '';
        document.getElementById('employer').value = emp.employer_name || '';

        form.hidden = false;
        raw.textContent = JSON.stringify(data, null, 2);
        rawWrap.hidden = false;
        setStatus('success', 'Your details have been prefilled below.');
      } catch (err) {
        setStatus('error', `Network error: ${err.message}`);
      }
    }

    run();
  </script>
</body>
</html>
